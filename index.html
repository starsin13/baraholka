<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0b1120;
            padding: 40px 20px;
            color: #e8edf5;
            min-height: 100vh;
        }
        header { text-align: center; padding: 20px 0 30px; }
        h1 { font-size: 2.4rem; font-weight: 500; }
        header p { color: #94a3b8; font-size: 1rem; margin-top: 4px; }

        .search-box {
            max-width: 400px;
            margin: 0 auto 30px;
            display: flex;
            gap: 10px;
        }
        .search-box input {
            flex: 1;
            padding: 10px 16px;
            border-radius: 30px;
            border: 1px solid #334155;
            background: #1e293b;
            color: #e8edf5;
            font-size: 1rem;
            outline: none;
            transition: border 0.2s;
        }
        .search-box input:focus { border-color: #60a5fa; }
        .search-box input::placeholder { color: #64748b; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 24px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .card {
            background: #1e293b;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #334155;
            transition: transform 0.2s, border-color 0.2s;
            cursor: pointer;
        }
        .card:hover { transform: translateY(-4px); border-color: #60a5fa; }
        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
            background: #0f172a;
        }
        .card-body { padding: 12px 16px 16px; }
        .card-title { font-weight: 500; font-size: 1rem; }
        .card-price { color: #60a5fa; font-weight: 600; font-size: 0.95rem; margin-top: 2px; }
        .card-desc { color: #94a3b8; font-size: 0.85rem; margin-top: 4px; }
        .card-id { color: #64748b; font-size: 0.7rem; margin-top: 8px; }

        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            color: #94a3b8;
            padding: 40px 0;
        }

        .share-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #1e293b;
            color: #94a3b8;
            border: 1px solid #334155;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
            text-decoration: none;
        }
        .share-btn:hover {
            background: #334155;
            color: #e8edf5;
        }

        .top-btn {
            position: fixed;
            bottom: 80px;
            right: 20px;
            background: #1e293b;
            color: #94a3b8;
            border: 1px solid #334155;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            z-index: 999;
            opacity: 0;
            pointer-events: none;
        }
        .top-btn.visible {
            opacity: 1;
            pointer-events: auto;
        }
        .top-btn:hover {
            background: #334155;
            color: #e8edf5;
            border-color: #60a5fa;
        }

        .visitor-counter {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1e293b;
            color: #94a3b8;
            padding: 8px 14px;
            border-radius: 30px;
            font-size: 13px;
            border: 1px solid #334155;
            z-index: 999;
        }

        footer {
            text-align: center;
            padding: 40px 0 10px;
            color: #64748b;
            font-size: 0.9rem;
            border-top: 1px solid #1e293b;
            margin-top: 40px;
        }
        footer a { color: #94a3b8; text-decoration: none; }

        #modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(11,17,32,0.92);
            backdrop-filter: blur(8px);
            cursor: pointer;
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        #modal img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            border-radius: 12px;
        }

        @media (max-width:600px) {
            body { padding: 20px 12px; }
            h1 { font-size: 1.8rem; }
            .grid { gap: 14px; grid-template-columns: repeat(auto-fill, minmax(160px,1fr)); }
            .card img { height: 150px; }
            .search-box { max-width: 100%; }
            .top-btn { bottom: 70px; right: 14px; width: 44px; height: 44px; font-size: 20px; }
            .visitor-counter { bottom: 16px; right: 14px; font-size: 11px; padding: 6px 12px; }
            .share-btn { font-size: 0.75rem; padding: 4px 12px; }
        }
    </style>
</head>
<body>

    <div class="visitor-counter">
        👁 Views: <span id="busuanzi_value_page_pv">0</span>
    </div>

    <button class="top-btn" id="topBtn" title="Наверх">↑</button>

    <header>
        <h1>Gallery</h1>
        <p>Photos from tovar1 folder</p>
    </header>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="🔍 Search by name..." />
    </div>

    <main id="gallery" class="grid"></main>

    <footer>
        <p>Contact: <a href="tel:+70000000000">+7 (000) 000-00-00</a></p>
    </footer>

    <div id="modal" onclick="this.style.display='none'">
        <img id="modalImg" src="" />
    </div>

    <script async src="https://busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>

    <script>
        const data = [{"img":"tovar1/549193520.jpg","id":"549193520","title":"Красивые камни","price":"10000р","desc":"Лучшие камни с лазурного берега"},{"img":"tovar1/7640.jpg","id":"7640","title":"Product name","price":"Price","desc":"Description"},{"img":"tovar1/image (1).jpg","id":"image (1)","title":"Имя продукта","price":"Price","desc":"Description"},{"img":"tovar1/image123.JPG","id":"image123","title":"Product name","price":"Price","desc":"Description"},{"img":"tovar1/image23.JPG","id":"image23","title":"Product name","price":"Price","desc":"Description"},{"img":"tovar1/smailiki-zheltye-shary-ulybki.jpg","id":"smailiki-zheltye-shary-ulybki","title":"Product name","price":"Price","desc":"Description"}];

        const gallery = document.getElementById('gallery');
        const searchInput = document.getElementById('searchInput');

        function render(filter = '') {
            const filtered = data.filter(item =>
                item.title.toLowerCase().includes(filter.toLowerCase()) ||
                item.desc.toLowerCase().includes(filter.toLowerCase()) ||
                item.id.toLowerCase().includes(filter.toLowerCase())
            );

            if (filtered.length === 0) {
                gallery.innerHTML = `<div class="no-results">😕 No results found</div>`;
                return;
            }

            gallery.innerHTML = filtered.map(item => `
                <div class="card" onclick="openImage('${item.img}')">
                    <img src="${item.img}" alt="${item.title}" loading="lazy" />
                    <div class="card-body">
                        <div class="card-title">${item.title}</div>
                        ${item.price ? `<div class="card-price">${item.price}</div>` : ''}
                        ${item.desc ? `<div class="card-desc">${item.desc}</div>` : ''}
                        ${item.id ? `<div class="card-id">ID: ${item.id}</div>` : ''}
                        <button class="share-btn" onclick="event.stopPropagation(); shareItem('${item.title}', '${item.img}')">
                            📤 Share
                        </button>
                    </div>
                </div>
            `).join('');
        }

        searchInput.addEventListener('input', (e) => render(e.target.value));
        render();

        function openImage(src) {
            document.getElementById('modalImg').src = src;
            document.getElementById('modal').style.display = 'flex';
        }

        function shareItem(title, img) {
            const url = window.location.href.split('?')[0];
            const text = `Check this: ${title} - ${url}`;
            if (navigator.share) {
                navigator.share({ title, text, url });
            } else {
                navigator.clipboard?.writeText(`${title} - ${url}`).then(() => {
                    alert('Link copied to clipboard!');
                }).catch(() => {
                    prompt('Copy this link:', `${title} - ${url}`);
                });
            }
        }

        // Кнопка "Наверх"
        const topBtn = document.getElementById('topBtn');
        window.addEventListener('scroll', () => {
            topBtn.classList.toggle('visible', window.scrollY > 300);
        });
        topBtn.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    </script>

</body>
</html>
