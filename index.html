<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Маркетплейс</title>
    <!-- ... ваш существующий head ... -->
    <style>
    /* ... ваш существующий CSS ... */
    
    /* ДОБАВИТЬ ЭТО В КОНЕЦ CSS */
    .modal-nav {
        position: fixed;
        top: 50%;
        transform: translateY(-50%);
        z-index: 1001;
        background: rgba(30, 41, 59, 0.8);
        color: #e8edf5;
        border: 1px solid #334155;
        border-radius: 50%;
        width: 48px;
        height: 48px;
        font-size: 24px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
        backdrop-filter: blur(4px);
    }
    .modal-nav:hover {
        background: rgba(96, 165, 250, 0.3);
        border-color: #60a5fa;
    }
    .modal-nav.prev {
        left: 20px;
    }
    .modal-nav.next {
        right: 20px;
    }
    .modal-nav.hidden {
        display: none;
    }
    
    @media (max-width: 600px) {
        .modal-nav {
            width: 40px;
            height: 40px;
            font-size: 18px;
        }
        .modal-nav.prev { left: 10px; }
        .modal-nav.next { right: 10px; }
    }
    </style>
</head>
<body>
    <!-- ... ваш существующий HTML ... -->

    <!-- МОДАЛЬНОЕ ОКНО С НАВИГАЦИЕЙ -->
    <div id="modal" style="display:none;">
        <button class="modal-nav prev" id="modalPrev">‹</button>
        <img id="modalImg" src="" onclick="event.stopPropagation();" />
        <button class="modal-nav next" id="modalNext">›</button>
    </div>

    <script>
    // ============================================
    // ВАШ СУЩЕСТВУЮЩИЙ КОД ДО МОДАЛЬНОГО ОКНА
    // ============================================

    // ============================================
    // МОДАЛЬНОЕ ОКНО С НАВИГАЦИЕЙ
    // ============================================
    let currentImageIndex = 0;
    let currentImageList = [];

    function getImageList() {
        // Собираем все изображения из текущего отображения
        const images = [];
        document.querySelectorAll('.card img').forEach(img => {
            images.push(img.getAttribute('src'));
        });
        return images;
    }

    function openImage(src) {
        const modal = document.getElementById('modal');
        const modalImg = document.getElementById('modalImg');
        const modalPrev = document.getElementById('modalPrev');
        const modalNext = document.getElementById('modalNext');
        
        // Получаем список всех видимых изображений
        currentImageList = getImageList();
        currentImageIndex = currentImageList.indexOf(src);
        
        if (currentImageIndex === -1) {
            // Если изображение не найдено в списке, показываем только его
            modalImg.src = src;
            modalPrev.classList.add('hidden');
            modalNext.classList.add('hidden');
        } else {
            modalImg.src = src;
            // Показываем/скрываем кнопки навигации
            modalPrev.classList.toggle('hidden', currentImageIndex === 0);
            modalNext.classList.toggle('hidden', currentImageIndex === currentImageList.length - 1);
        }
        
        modal.style.display = 'flex';
        document.body.style.overflow = 'hidden'; // Блокируем скролл
    }

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
        document.body.style.overflow = ''; // Возвращаем скролл
    }

    function navigateModal(direction) {
        if (currentImageList.length === 0) return;
        
        const newIndex = currentImageIndex + direction;
        if (newIndex < 0 || newIndex >= currentImageList.length) return;
        
        currentImageIndex = newIndex;
        const modalImg = document.getElementById('modalImg');
        const modalPrev = document.getElementById('modalPrev');
        const modalNext = document.getElementById('modalNext');
        
        modalImg.src = currentImageList[currentImageIndex];
        
        // Обновляем видимость кнопок
        modalPrev.classList.toggle('hidden', currentImageIndex === 0);
        modalNext.classList.toggle('hidden', currentImageIndex === currentImageList.length - 1);
    }

    // Обработчики для модального окна
    document.addEventListener('DOMContentLoaded', function() {
        const modal = document.getElementById('modal');
        const modalPrev = document.getElementById('modalPrev');
        const modalNext = document.getElementById('modalNext');
        
        // Закрытие по клику на фон
        modal.addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });
        
        // Кнопки навигации
        modalPrev.addEventListener('click', function(e) {
            e.stopPropagation();
            navigateModal(-1);
        });
        
        modalNext.addEventListener('click', function(e) {
            e.stopPropagation();
            navigateModal(1);
        });
        
        // Закрытие по ESC
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
            }
            if (e.key === 'ArrowLeft' && document.getElementById('modal').style.display === 'flex') {
                navigateModal(-1);
            }
            if (e.key === 'ArrowRight' && document.getElementById('modal').style.display === 'flex') {
                navigateModal(1);
            }
        });
    });

    // Переопределяем функцию renderItems, чтобы обновлять список изображений
    const originalRenderItems = renderItems;
    renderItems = function(items) {
        originalRenderItems(items);
        // Обновляем список изображений для модального окна
        currentImageList = getImageList();
    };

    // ============================================
    // ОСТАЛЬНОЙ КОД
    // ============================================
    </script>
</body>
</html>
