<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Маркетплейс</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0b1120;
            padding: 40px 20px;
            color: #e8edf5;
            min-height: 100vh;
        }
        header { text-align: center; padding: 20px 0 30px; }
        h1 { font-size: 2.4rem; font-weight: 500; }
        header p { color: #94a3b8; font-size: 1rem; margin-top: 4px; }

        .controls {
            max-width: 1200px;
            margin: 0 auto 25px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            justify-content: center;
        }

        .search-box {
            flex: 1;
            min-width: 180px;
            max-width: 350px;
            display: flex;
            gap: 10px;
        }
        .search-box input {
            flex: 1;
            padding: 10px 16px;
            border-radius: 30px;
            border: 1px solid #334155;
            background: #1e293b;
            color: #e8edf5;
            font-size: 1rem;
            outline: none;
            transition: border 0.2s;
        }
        .search-box input:focus { border-color: #60a5fa; }
        .search-box input::placeholder { color: #64748b; }

        .filter-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }

        .filter-group select {
            padding: 10px 16px;
            border-radius: 30px;
            border: 1px solid #334155;
            background: #1e293b;
            color: #e8edf5;
            font-size: 0.95rem;
            outline: none;
            cursor: pointer;
            transition: border 0.2s;
            min-width: 150px;
        }
        .filter-group select:focus { border-color: #60a5fa; }
        .filter-group select option { background: #1e293b; }

        .category-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            padding: 0 10px;
            margin-bottom: 20px;
        }

        .category-tag {
            padding: 6px 18px;
            border-radius: 30px;
            border: 1px solid #334155;
            background: #1e293b;
            color: #94a3b8;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
            user-select: none;
        }
        .category-tag:hover {
            border-color: #60a5fa;
            color: #e8edf5;
        }
        .category-tag.active {
            background: #60a5fa;
            color: #0b1120;
            border-color: #60a5fa;
            font-weight: 500;
        }

        .back-btn {
            display: inline-block;
            padding: 8px 20px;
            background: #1e293b;
            color: #94a3b8;
            border: 1px solid #334155;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
            text-decoration: none;
        }
        .back-btn:hover {
            background: #334155;
            color: #e8edf5;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 24px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .card {
            background: #1e293b;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #334155;
            transition: transform 0.2s, border-color 0.2s;
            cursor: pointer;
            animation: fadeIn 0.3s ease;
        }
        .card:hover { transform: translateY(-4px); border-color: #60a5fa; }
        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
            background: #0f172a;
        }
        .card-body { padding: 12px 16px 16px; }
        .card-title { font-weight: 500; font-size: 1rem; }
        .card-price { color: #60a5fa; font-weight: 600; font-size: 0.95rem; margin-top: 2px; }
        .card-desc { color: #94a3b8; font-size: 0.85rem; margin-top: 4px; }
        .card-category { 
            color: #64748b; 
            font-size: 0.75rem; 
            margin-top: 6px;
            display: inline-block;
            background: #0f172a;
            padding: 2px 10px;
            border-radius: 20px;
        }
        .card-id { color: #64748b; font-size: 0.7rem; margin-top: 4px; }
        .card-views {
            color: #94a3b8;
            font-size: 0.8rem;
            margin-top: 4px;
        }

        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            color: #94a3b8;
            padding: 40px 0;
        }

        .share-btn {
            display: inline-flex !important;
            align-items: center;
            gap: 6px;
            background: #1e293b;
            color: #94a3b8;
            border: 1px solid #334155;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
            text-decoration: none;
        }
        .share-btn:hover {
            background: #334155;
            color: #e8edf5;
        }

        /* ===== КНОПКА "ЗАГРУЗИТЬ ЕЩЕ" ===== */
        .load-more-container {
            text-align: center;
            padding: 30px 0 10px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .load-more-btn {
            padding: 12px 40px;
            border-radius: 30px;
            border: 1px solid #334155;
            background: #1e293b;
            color: #94a3b8;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .load-more-btn:hover {
            background: #334155;
            color: #e8edf5;
            border-color: #60a5fa;
        }
        .load-more-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .load-more-btn.hidden {
            display: none;
        }

        .top-btn {
            position: fixed;
            bottom: 80px;
            right: 20px;
            background: #1e293b;
            color: #94a3b8;
            border: 1px solid #334155;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            z-index: 999;
            opacity: 0;
            pointer-events: none;
        }
        .top-btn.visible {
            opacity: 1;
            pointer-events: auto;
        }
        .top-btn:hover {
            background: #334155;
            color: #e8edf5;
            border-color: #60a5fa;
        }

        .visitor-counter {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1e293b;
            color: #94a3b8;
            padding: 8px 14px;
            border-radius: 30px;
            font-size: 13px;
            border: 1px solid #334155;
            z-index: 999;
        }

        footer {
            text-align: center;
            padding: 40px 0 10px;
            color: #64748b;
            font-size: 0.9rem;
            border-top: 1px solid #1e293b;
            margin-top: 40px;
        }
        footer a { color: #94a3b8; text-decoration: none; }

        #modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(11,17,32,0.92);
            backdrop-filter: blur(8px);
            cursor: pointer;
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        #modal img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            border-radius: 12px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width:600px) {
            body { padding: 20px 12px; }
            h1 { font-size: 1.8rem; }
            .grid { gap: 14px; grid-template-columns: repeat(auto-fill, minmax(160px,1fr)); }
            .card img { height: 150px; }
            .search-box { max-width: 100%; }
            .top-btn { bottom: 70px; right: 14px; width: 44px; height: 44px; font-size: 20px; }
            .visitor-counter { bottom: 16px; right: 14px; font-size: 11px; padding: 6px 12px; }
            .controls { flex-direction: column; align-items: stretch; }
            .filter-group { justify-content: center; }
            .load-more-btn { padding: 10px 24px; font-size: 0.9rem; width: 100%; }
        }
    </style>
</head>

        // ============================================
        // КАТЕГОРИИ И ФИЛЬТРЫ

        const gallery = document.getElementById('gallery');
        const searchInput = document.getElementById('searchInput');
        const sortSelect = document.getElementById('sortSelect');
        const backContainer = document.getElementById('backButtonContainer');
        const categoryTags = document.getElementById('categoryTags');

        let currentCategory = 'Все';

        // ============================================
        // ПАГИНАЦИЯ (20 товаров за раз)
        // ============================================
        const ITEMS_PER_PAGE = 20;
        let currentPage = 1;
        let allFilteredItems = [];

        // ============================================
        // СЧЕТЧИК ПРОСМОТРОВ (localStorage)
        // ============================================
        const VIEWS_KEY = 'product_views';

        function getViews() {
            try {
                const data = localStorage.getItem(VIEWS_KEY);
                return data ? JSON.parse(data) : {};
            } catch {
                return {};
            }
        }

        function saveViews(views) {
            localStorage.setItem(VIEWS_KEY, JSON.stringify(views));
        }

        function incrementView(productId) {
            if (!productId) return;
            const views = getViews();
            views[productId] = (views[productId] || 0) + 1;
            saveViews(views);
            updateViewsDisplay(productId, views[productId]);
        }

        function updateViewsDisplay(productId, count) {
            const cards = document.querySelectorAll('.card');
            cards.forEach(card => {
                const idElement = card.querySelector('.card-id');
                if (idElement && idElement.textContent.includes(productId)) {
                    let viewsElement = card.querySelector('.card-views');
                    if (viewsElement) {
                        viewsElement.textContent = `👁️ ${count} просмотров`;
                    } else {
                        const body = card.querySelector('.card-body');
                        const viewsDiv = document.createElement('div');
                        viewsDiv.className = 'card-views';
                        viewsDiv.textContent = `👁️ ${count} просмотров`;
                        const idDiv = body.querySelector('.card-id');
                        if (idDiv) {
                            body.insertBefore(viewsDiv, idDiv);
                        } else {
                            body.appendChild(viewsDiv);
                        }
                    }
                }
            });
        }

        // ============================================
        // ФУНКЦИИ КАТЕГОРИЙ
        // ============================================
        function getCategories() {
            const cats = new Set(data.map(item => item.category || 'Без категории'));
            return ['Все', ...Array.from(cats).sort()];
        }

        function renderCategories() {
            const categories = getCategories();
            categoryTags.innerHTML = categories.map(cat => `
                <span class="category-tag ${cat === currentCategory ? 'active' : ''}" 
                      onclick="filterByCategory('${cat.replace(/'/g, "\\'")}')">
                    ${cat}
                </span>
            `).join('');
        }

        function filterByCategory(category) {
            currentCategory = category;
            currentPage = 1;
            renderCategories();
            render();
        }

        // ============================================
        // ФУНКЦИИ URL
        // ============================================
        function getItemIdFromURL() {
            const params = new URLSearchParams(window.location.search);
            return params.get('id');
        }

        function updateURL(id) {
            const baseUrl = window.location.pathname;
            const newUrl = id ? `${baseUrl}?id=${id}` : baseUrl;
            window.history.pushState({}, '', newUrl);
        }

        // ============================================
        // СОРТИРОВКА
        // ============================================
        function sortItems(items, sortType) {
            const sorted = [...items];
            switch(sortType) {
                case 'price-asc':
                    return sorted.sort((a, b) => parseFloat(a.price) - parseFloat(b.price));
                case 'price-desc':
                    return sorted.sort((a, b) => parseFloat(b.price) - parseFloat(a.price));
                case 'title-asc':
                    return sorted.sort((a, b) => a.title.localeCompare(b.title));
                case 'title-desc':
                    return sorted.sort((a, b) => b.title.localeCompare(a.title));
                default:
                    return sorted;
            }
        }

        // ============================================
        // ПАГИНАЦИЯ
        // ============================================
        function getCurrentPageItems() {
            const start = 0;
            const end = currentPage * ITEMS_PER_PAGE;
            return allFilteredItems.slice(start, end);
        }

        function hasMoreItems() {
            return currentPage * ITEMS_PER_PAGE < allFilteredItems.length;
        }

        function updateLoadMoreButton() {
            if (!loadMoreBtn) return;

            const isSingleItem = !!getItemIdFromURL();

            if (hasMoreItems() && allFilteredItems.length > 0 && !isSingleItem) {
                const remaining = allFilteredItems.length - currentPage * ITEMS_PER_PAGE;
                loadMoreBtn.classList.remove('hidden');
                loadMoreBtn.disabled = false;
                loadMoreBtn.textContent = `📦 Загрузить еще (${remaining} осталось)`;
            } else if (allFilteredItems.length > 0 && !isSingleItem) {
                loadMoreBtn.classList.remove('hidden');
                loadMoreBtn.disabled = true;
                loadMoreBtn.textContent = '✅ Все товары загружены';
            } else {
                loadMoreBtn.classList.add('hidden');
            }
        }

        function renderItems(items) {
            const views = getViews();

            if (items.length === 0) {
                gallery.innerHTML = `<div class="no-results">😕 Ничего не найдено</div>`;
                return;
            }

            gallery.innerHTML = items.map(item => `
                <div class="card" onclick="openItem('${item.id}')">
                    <img src="${item.img}" alt="${item.title}" loading="lazy" />
                    <div class="card-body">
                        <div class="card-title">${item.title}</div>
                        ${item.price ? `<div class="card-price">${item.price}</div>` : ''}
                        ${item.desc ? `<div class="card-desc">${item.desc}</div>` : ''}
                        ${item.category ? `<div class="card-category">📂 ${item.category}</div>` : ''}
                        ${views[item.id] ? `<div class="card-views">👁️ ${views[item.id]} просмотров</div>` : ''}
                        ${item.id ? `<div class="card-id">ID: ${item.id}</div>` : ''}
                        <button class="share-btn" onclick="event.stopPropagation(); shareItem('${item.title}', '${item.img}', '${item.id}')">
                            📤 Поделиться
                        </button>
                    </div>
                </div>
            `).join('');

            // Обновляем просмотры после рендера
            setTimeout(() => {
                const currentViews = getViews();
                Object.keys(currentViews).forEach(id => {
                    updateViewsDisplay(id, currentViews[id]);
                });
            }, 50);
        }

        // ============================================
        // ОСНОВНОЙ РЕНДЕР
        // ============================================
        function render() {
            const id = getItemIdFromURL();
            let filtered = data;

            // Если выбран конкретный товар по ID
            if (id) {
                filtered = data.filter(item => item.id === id);
                backContainer.innerHTML = `<button class="back-btn" onclick="goBack()">⬅ Назад ко всем</button>`;
                if (filtered.length === 0) {
                    gallery.innerHTML = `<div class="no-results">😕 Товар не найден</div>`;
                    loadMoreBtn.classList.add('hidden');
                    return;
                }
                renderItems(filtered);
                loadMoreBtn.classList.add('hidden');
                return;
            }

            backContainer.innerHTML = '';

            // Фильтр по категории
            if (currentCategory !== 'Все') {
                filtered = filtered.filter(item => (item.category || 'Без категории') === currentCategory);
            }

            // Поиск
            if (currentSearch) {
                const search = currentSearch.toLowerCase();
                filtered = filtered.filter(item =>
                    item.title.toLowerCase().includes(search) ||
                    item.desc.toLowerCase().includes(search) ||
                    item.id.toLowerCase().includes(search)
                );
            }

            // Сортировка
            filtered = sortItems(filtered, sortSelect.value);

            // Сохраняем все отфильтрованные товары
            allFilteredItems = filtered;
            currentPage = 1;

            // Показываем первую страницу
            renderItems(getCurrentPageItems());
            updateLoadMoreButton();
        }

        // ============================================
        // ОБРАБОТЧИКИ
        // ============================================
        function openItem(id) {
            incrementView(id);
            updateURL(id);
            render();
        }

        function goBack() {
            updateURL(null);
            render();
        }

        // Загрузить еще
        if (loadMoreBtn) {
            loadMoreBtn.addEventListener('click', function() {
                currentPage++;
                renderItems(getCurrentPageItems());
                updateLoadMoreButton();

                const lastCard = document.querySelector('.card:last-child');
                if (lastCard) {
                    lastCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            });
        }

        // Поиск
        searchInput.addEventListener('input', (e) => {
            currentSearch = e.target.value;
            currentPage = 1;
            if (getItemIdFromURL()) {
                updateURL(null);
            }
            render();
        });

        // Сортировка
        sortSelect.addEventListener('change', () => {
            currentPage = 1;
            render();
        });

        // Кнопка "Назад" в браузере
        window.addEventListener('popstate', () => {
            render();
        });

        // ============================================
        // ПОДЕЛИТЬСЯ
        // ============================================
        function shareItem(title, img, id) {
            const baseUrl = window.location.href.split('?')[0];
            const itemUrl = `${baseUrl}?id=${id}`;
            const text = `📦 ${title} - ${itemUrl}`;

            if (navigator.share) {
                navigator.share({ title, text, url: itemUrl });
            } else {
                navigator.clipboard?.writeText(`${title} - ${itemUrl}`).then(() => {
                    alert('Ссылка скопирована!');
                }).catch(() => {
                    prompt('Скопируйте ссылку:', `${title} - ${itemUrl}`);
                });
            }
        }

        // ============================================
        // МОДАЛЬНОЕ ОКНО ДЛЯ ФОТО
        // ============================================
        function openImage(src) {
            document.getElementById('modalImg').src = src;
            document.getElementById('modal').style.display = 'flex';
        }

        // ============================================
        // КНОПКА "НАВЕРХ"
        // ============================================
        const topBtn = document.getElementById('topBtn');
        window.addEventListener('scroll', () => {
            topBtn.classList.toggle('visible', window.scrollY > 300);
        });
        topBtn.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        // ============================================
        // ИНИЦИАЛИЗАЦИЯ
        // ============================================
        renderCategories();
        render();
    </script>

</body>
</html>
